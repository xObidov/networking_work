{% extends "base.html" %}
{% load i18n %}
{% block auth_content %}
<div class="card auth-card shadow">
  <div class="card-body p-4 text-center">
    <i class="bi bi-envelope-check fs-1 text-success"></i>
    <h5 class="mt-3">{% trans "Check your inbox" %}</h5>
    <p class="text-muted">If an account exists for that email, a reset link has been sent.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-outline-primary">{% trans "Back to sign in" %}</a>
  </div>
</div>
{% endblock %}
