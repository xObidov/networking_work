{% extends "base.html" %}
{% load i18n %}
{% block title %}Register — CRM{% endblock %}
{% block auth_content %}
<div class="card auth-card shadow">
  <div class="card-body p-4">
    <h4 class="text-center mb-4">{% trans "Create your account" %}</h4>
    <form method="post">{% csrf_token %}
      {% include "includes/form_fields.html" %}
      <button class="btn btn-primary w-100">{% trans "Register" %}</button>
    </form>
    <p class="text-center small mt-3 mb-0">{% trans "Already registered?" %} <a href="{% url 'accounts:login' %}">{% trans "Sign In" %}</a></p>
  </div>
</div>
{% endblock %}
