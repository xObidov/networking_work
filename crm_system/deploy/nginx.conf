# Nginx site config — install to /etc/nginx/sites-available/crm (or conf.d/crm.conf)
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Redirect everything to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 12M;   # slightly above MAX_UPLOAD_SIZE_MB

    # Static files are served by WhiteNoise too, but Nginx is faster for media
    location /media/ {
        alias /srv/crm_system/media/;
        expires 30d;
    }

    location / {
        proxy_pass http://unix:/run/crm/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;
}
