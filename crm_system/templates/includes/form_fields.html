{% for field in form %}
<div class="mb-3 {% if field.field.widget.input_type == 'checkbox' %}form-check{% endif %}">
  <label class="form-label {% if field.field.widget.input_type == 'checkbox' %}form-check-label{% endif %}" for="{{ field.id_for_label }}">{{ field.label }}{% if field.field.required %} *{% endif %}</label>
  {{ field }}
  {% if field.help_text %}<div class="form-text">{{ field.help_text }}</div>{% endif %}
  {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
</div>
{% endfor %}
{% for error in form.non_field_errors %}
<div class="alert alert-danger py-2">{{ error }}</div>
{% endfor %}
