{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block auth_content %}
<div class="card auth-card shadow">
  <div class="card-body p-4">
    <h4 class="text-center mb-3">Reset your password</h4>
    <p class="text-muted small text-center">Enter your email and we'll send a reset link.</p>
    <form method="post">{% csrf_token %}
      <div class="mb-3">
        <input type="email" name="email" class="form-control" placeholder="you@company.com" required>
      </div>
      <button class="btn btn-primary w-100">Send Reset Link</button>
    </form>
    <p class="text-center small mt-3 mb-0"><a href="{% url 'accounts:login' %}">Back to sign in</a></p>
  </div>
</div>
{% endblock %}
