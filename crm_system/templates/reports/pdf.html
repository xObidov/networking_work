<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Helvetica, sans-serif; font-size: 10px; color: #222; }
  h1 { color: #0d6efd; font-size: 18px; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { padding: 5px; border-bottom: 1px solid #ddd; text-align: left; }
  th { background: #f1f3f5; }
  .muted { color: #777; }
</style>
</head>
<body>
  <h1>{{ report.title }}</h1>
  <p class="muted">Generated: {{ generated_at|date:"Y-m-d H:i" }}</p>
  <table>
    <thead><tr>{% for header in report.headers %}<th>{{ header }}</th>{% endfor %}</tr></thead>
    <tbody>
      {% for row in report.rows %}
      <tr>{% for cell in row %}<td>{{ cell }}</td>{% endfor %}</tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
